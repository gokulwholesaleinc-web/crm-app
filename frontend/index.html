<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Link Creative Co. branded favicons (sourced from linkcreativeco.com).
         The legacy /favicon.svg is the generic CRM purple-person icon; we
         leave it on disk for non-prod fallbacks but DO NOT link it — modern
         browsers prefer SVG over PNG, so linking the unbranded SVG would
         shadow these PNGs in tabs/bookmarks. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="CRM Application - Manage your customer relationships effectively" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="light dark" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter font (non-render-blocking: loads async, swaps in when ready) -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />

    <title>Link Creative Co - CRM</title>
    <script>
      // Prevent flash of wrong theme by applying dark class before render
      (function() {
        try {
          var stored = localStorage.getItem('crm-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || (!stored && prefersDark);
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
