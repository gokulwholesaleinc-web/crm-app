[pytest]
asyncio_mode = auto
testpaths = unit integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    pg: requires a real Postgres tier (set MARKETING_TEST_PG_URL); skipped otherwise
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
